<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; }
        textarea { width: 100%; height: 150px; background: #1a1a1a; color: #00ff41; border: 1px solid #00ff41; padding: 10px; }
        button { background: #00ff41; color: #0a0a0a; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        #log { margin-top: 20px; border-top: 1px solid #333; padding-top: 10px; }
    </style>
</head>
<body>
    <h1>> STEAM_MANIFEST_TERMINAL_V1.0</h1>
    <p>Gebe AppIDs ein (durch Komma oder Zeilenumbruch getrennt):</p>
    <textarea id="inputIds" placeholder="z.B. 440, 730, 570..."></textarea>
    <br>
    <button onclick="processBulk()">[ BATCH_EXECUTE ]</button>
    <div id="log"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        async function processBulk() {
            const log = document.getElementById('log');
            log.innerHTML = "> Starte Batch-Prozess...<br>";
            
            const rawInput = document.getElementById('inputIds').value;
            const ids = [...new Set(rawInput.split(/[\s,]+/))].filter(Boolean);
            
            const [manifests, depotKeys] = await Promise.all([
                fetch('appaccesstokens.json').then(r => r.json()),
                fetch('depotkeys.json').then(r => r.json())
            ]);

            const zip = new JSZip();
            let count = 0;

            for (const id of ids) {
                if (manifests[id]) {
                    const content = `local manifest = "${manifests[id]}"\nlocal key = "${depotKeys[id] || 'NOT_FOUND'}"`;
                    zip.file(`config_${id}.lua`, content);
                    log.innerHTML += `> [OK] AppID ${id} geladen.<br>`;
                    count++;
                } else {
                    log.innerHTML += `> [ERROR] AppID ${id} nicht gefunden.<br>`;
                }
            }

            if (count > 0) {
                const blob = await zip.generateAsync({type:"blob"});
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = "manifests_bundle.zip";
                link.click();
                log.innerHTML += `> [FINISH] ${count} Dateien komprimiert und bereitgestellt.`;
            }
        }
    </script>
</body>
</html>
