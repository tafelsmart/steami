<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Steam Manifest & Lua Master Terminal</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; }
        .config-box { background: #111; border: 1px solid #333; padding: 15px; margin-bottom: 20px; border-left: 3px solid #00ff41; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; }
        input[type="text"] { width: 100%; background: #1a1a1a; color: #00ff41; border: 1px solid #00ff41; padding: 8px; font-family: 'Courier New', monospace; box-sizing: border-box; }
        textarea { width: 100%; height: 120px; background: #1a1a1a; color: #00ff41; border: 1px solid #00ff41; padding: 10px; font-family: 'Courier New', monospace; box-sizing: border-box; }
        button { background: #00ff41; color: #0a0a0a; border: none; padding: 12px 25px; cursor: pointer; font-weight: bold; margin-top: 15px; font-family: 'Courier New', monospace; font-size: 14px; }
        button:hover { background: #00b32d; }
        #log { margin-top: 20px; border-top: 1px solid #333; padding-top: 10px; max-height: 400px; overflow-y: auto; background: #111; padding: 15px; border: 1px solid #222; }
        .ok { color: #00ff41; }
        .info { color: #00bfff; }
        .err { color: #ff3333; font-weight: bold; }
    </style>
</head>
<body>
    <h1>> STEAM_MANIFEST_MASTER_TERMINAL_V2.2</h1>
    
    <div class="config-box">
        <h3>[ AUTH_KONFIGURATION ]</h3>
        <label>API KEY (Von manifesthub1.filegear-sg.me):</label>
        <!-- FIX: 'value' statt 'placeholder' genutzt, damit der Key aktiv verwendet wird -->
        <input type="text" id="apiKey" value="314aa7fbedbf9d1aa6d793743b705e9cb5ac8c6f028c380a4b2cff65526564b2d045b5272107">
    </div>

    <p>Gib die IDs ein (AppIDs oder DepotIDs, getrennt durch Komma, Leerzeichen oder Zeile):</p>
    <textarea id="inputIds" placeholder="Beispiel: 1205041, 1205042, 766..."></textarea>
    <br>
    <button onclick="starteBatchProzess()">[ BATCH_PROZESS_STARTEN ]</button>
    
    <div id="log">> Terminal einsatzbereit. Warte auf Befehle, Supreme Commander...</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        async function starteBatchProzess() {
            const log = document.getElementById('log');
            const apiKey = document.getElementById('apiKey').value.trim();
            const rawInput = document.getElementById('inputIds').value;

            if (!apiKey) {
                log.innerHTML = "<span class='err'>> [CRITICAL ERROR] Zugriff verweigert: Kein API-Key eingetragen!</span>";
                return;
            }

            const eingabeIds = [...new Set(rawInput.split(/[\s,]+/))].filter(Boolean);
            if (eingabeIds.length === 0) {
                log.innerHTML = "<span class='err'>> [ABORT] Abbruch: Keine IDs im Textfeld gefunden.</span>";
                return;
            }

            log.innerHTML = `> [INIT] Starte System-Scan...<br>`;
            log.innerHTML += `> Lade lokale JSON-Dateien...<br>`;
            
            let manifests = {}, depotKeys = {};
            try {
                const resTokens = await fetch('appaccesstokens.json');
                const resKeys = await fetch('depotkeys.json');
                
                if (resTokens.ok) manifests = await resTokens.json();
                if (resKeys.ok) depotKeys = await resKeys.json();
                
                log.innerHTML += "<span class='ok'>> [INFO] Lokale Datenbanken erfolgreich geladen.</span><br>";
            } catch(e) {
                log.innerHTML += "<span class='info'>> [HINWEIS] Lokale JSONs nicht gefunden. Nutze reinen API-Modus.</span><br>";
            }

            const zip = new JSZip();
            let erfolgsCount = 0;
            const alleLokalenDepotIds = Object.keys(manifests);

            for (const id of eingabeIds) {
                log.innerHTML += `<br>> Verarbeite ID: <b style="color:#fff">${id}</b>...<br>`;
                let gefundeneDepots = [];

                // 1. Exakte DepotID lokal vorhanden
                if (manifests[id]) {
                    gefundeneDepots.push({ depotId: id, manifestId: manifests[id] });
                } 
                // 2. Lokaler Scan nach Präfix (falls AppID eingegeben wurde)
                else if (alleLokalenDepotIds.length > 0) {
                    const prefix = id.substring(0, Math.min(id.length, 5));
                    const passendeZugehoerige = alleLokalenDepotIds.filter(dId => dId.startsWith(prefix));
                    
                    for (const dId of passendeZugehoerige) {
                        gefundeneDepots.push({ depotId: dId, manifestId: manifests[dId] });
                    }
                }

                // 3. Fallback: Wenn lokal nichts matcht, versuchen wir das Depot direkt online abzufragen
                if (gefundeneDepots.length === 0) {
                    gefundeneDepots.push({ depotId: id, manifestId: "" });
                }

                for (const depot of gefundeneDepots) {
                    log.innerHTML += `> Rufe ManifestHub API für ID ${depot.depotId} ab...<br>`;
                    
                    let url = `https://api.manifesthub1.filegear-sg.me/manifest?apikey=${apiKey}&depotid=${depot.depotId}`;
                    if (depot.manifestId) {
                        url += `&manifestid=${depot.manifestId}`;
                    }

                    try {
                        const antwort = await fetch(url);
                        
                        if (antwort.ok) {
                            const datenText = await antwort.text();
                            const lokalerKey = depotKeys[depot.depotId] || "ONLINE_API";

                            const luaInhalt = `local depotId = "${depot.depotId}"\nlocal key = "${lokalerKey}"\nlocal manifestData = [==[\n${datenText}\n]==]\nreturn { depotId = depotId, key = key, data = manifestData }`;
                            
                            zip.file(`config_${depot.depotId}.lua`, luaInhalt);
                            log.innerHTML += `<span class='ok'>> [OK] ID ${depot.depotId} erfolgreich vom API-Server geladen!</span><br>`;
                            erfolgsCount++;
                        } else {
                            log.innerHTML += `<span class='err'>> [FEHLER] Server verweigert Zugriff für ID ${depot.depotId} (Status: ${antwort.status}). Key abgelaufen oder ID ungültig?</span><br>`;
                        }
                    } catch (err) {
                        log.innerHTML += `<span class='err'>> [NETZWERK FEHLER] Verbindung zu ManifestHub fehlgeschlagen.</span><br>`;
                    }
                }
            }

            if (erfolgsCount > 0) {
                log.innerHTML += "<br>> Generiere ZIP-Archiv... Bitte warten...<br>";
                const blob = await zip.generateAsync({type:"blob"});
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `steam_manifests_master_${Date.now()}.zip`;
                link.click();
                log.innerHTML += `<span class='ok'>> [FINISH] Erfolgreich! ${erfolgsCount} Lua-Dateien im ZIP verpackt.</span>`;
            } else {
                log.innerHTML += "<br><span class='err'>> [ABBRUCH] Keine Manifeste über die API erhalten. Überprüfe deinen Key oder die IDs!</span>";
            }
        }
    </script>
</body>
</html>
